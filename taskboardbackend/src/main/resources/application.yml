spring:
  application:
    name: taskboardbackend

  datasource:
    url: jdbc:postgresql://localhost:5432/taskboard_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-secret-key-change-this-in-production-minimum-32-characters-long
  expiration: 900000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true